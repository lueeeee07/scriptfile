<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>

<body class="h-screen flex flex-col items-center justify-center bg-gradient-to-b from-teal-50 via-sky-100 to-sky-300 text-9xl">
    <h1 class=" text-black px-4 py-2 rounded">Counter</h1>
    <div class="text-center space-y-2">
        <input class="text-center block mx-auto" id="counterValue" type="text" value="0" readonly />
    
        <div class="mt-4 space-x-2">
            <button id="incrementBtn" class="w-40 h-40 bg-white hover:bg-purple-200 text-black px-4 py-2 rounded shadow transition">+</button>
            <button id="resetBtn" class="w-40 h-40 bg-white hover:bg-pink-300 text-black px-4 py-2 rounded shadow transition">↻</button>
    </div>
    </div>

    <script src="counter.js"></script>
</body>
</html>
